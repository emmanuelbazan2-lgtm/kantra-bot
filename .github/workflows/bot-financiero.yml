name: Bot Financiero Nocturno

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC = 23:00 Argentina (UTC-3)
  workflow_dispatch:

jobs:
  bot-financiero:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Procesar gastos y enviar resumen a Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node bot_financiero.js
